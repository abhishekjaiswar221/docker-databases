services:
  # MySQL
  mysql:
    image: mysql:8.1
    container_name: dev-mysql
    profiles: ["mysql"]
    mem_limit: 400m
    cpus: 0.5
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: devdb
      MYSQL_USER: devuser
      MYSQL_PASSWORD: devpass
    ports:
      - "3306:3306"
    networks:
      - mysql-network
    volumes:
      - ./data/mysql:/var/lib/mysql

  mysql-adminer:
    image: adminer:latest
    container_name: dev-adminer-mysql
    profiles: ["mysql"]
    restart: unless-stopped
    ports:
      - "9090:8080"
    networks:
      - mysql-network

  # PostgreSQL
  postgres:
    image: postgres:16-alpine
    container_name: dev-postgres
    profiles: ["postgres"]
    mem_limit: 350m
    cpus: 0.5
    restart: unless-stopped
    environment:
      POSTGRES_USER: devuser
      POSTGRES_PASSWORD: devpass
      POSTGRES_DB: devdb
    ports:
      - "5432:5432"
    networks:
      - postgres-network
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  postgres-adminer:
    image: adminer:latest
    container_name: dev-adminer-postgres
    profiles: ["postgres"]
    restart: unless-stopped
    ports:
      - "9091:8080"
    networks:
      - postgres-network

  # MongoDB
  mongo:
    image: mongo:7.0-jammy
    container_name: dev-mongo
    profiles: ["mongo"]
    mem_limit: 500m
    cpus: 0.5
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: root
    ports:
      - "27017:27017"
    networks:
      - mongo-network
    volumes:
      - ./data/mongo:/data/db

  mongo-express:
    image: mongo-express:latest
    container_name: dev-mongo-express
    profiles: ["mongo"]
    restart: unless-stopped
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: root
      ME_CONFIG_MONGODB_SERVER: mongo
    ports:
      - "9092:8081"
    networks:
      - mongo-network

  # Redis
  redis:
    image: redis:8-alpine
    container_name: dev-redis
    profiles: ["redis"]
    mem_limit: 200m
    cpus: 0.25
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    networks:
      - redis-network
    volumes:
      - ./data/redis:/data

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: dev-redis-commander
    profiles: ["redis"]
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "9093:8081"
    networks:
      - redis-network

networks:
  mysql-network:
    name: mysql-network
  postgres-network:
    name: postgres-network
  mongo-network:
    name: mongo-network
  redis-network:
    name: redis-network
